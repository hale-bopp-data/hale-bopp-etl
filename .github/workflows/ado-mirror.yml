# GitHub → ADO Mirror via PR (Circle 1: GitHub primary, ADO governance)
# Requires repository secret: ADO_PAT (Azure DevOps PAT with Code Read+Write+PR)
#
# Flow: GitHub push main → Action creates branch mirror/<sha> on ADO → creates PR →
#       ADO policies apply (reviewer, WI linking, merge strategy)
#
# GEDI: G16 Presa Elettrica — standard interface, governance preserved
# Model: PMI enterprise-grade at zero cost (ADO free tier + GitHub)
name: ADO Mirror

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      ADO_ORG: EasyWayData
      ADO_PROJECT: EasyWay-DataPortal
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror branch to ADO
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          MIRROR_BRANCH="mirror/${SHORT_SHA}"

          git remote add ado "https://${ADO_ORG}:${{ secrets.ADO_PAT }}@dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_git/${REPO_NAME}"
          git checkout -b "${MIRROR_BRANCH}"
          git push ado "${MIRROR_BRANCH}"

      - name: Create PR on ADO
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          MIRROR_BRANCH="mirror/${SHORT_SHA}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          curl -s -X POST \
            -u ":${{ secrets.ADO_PAT }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "sourceRefName": "refs/heads/${MIRROR_BRANCH}",
            "targetRefName": "refs/heads/main",
            "title": "[Mirror] ${COMMIT_MSG}",
            "description": "Automated mirror from GitHub commit ${GITHUB_SHA}.\n\nSource: https://github.com/${{ github.repository }}/commit/${GITHUB_SHA}"
          }
          EOF
          )" \
            "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/git/repositories/${REPO_NAME}/pullrequests?api-version=7.1"
