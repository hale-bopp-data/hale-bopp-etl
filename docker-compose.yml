services:
  webhook:
    build: .
    container_name: hale-bopp-etl-webhook
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - HALEBOPP_CONFIG=/app/config/orchestration/pipelines.yaml
      - HALEBOPP_EVENTS_DIR=/tmp/hale-bopp-events
      - PYTHONUNBUFFERED=1
    volumes:
      - events_data:/tmp/hale-bopp-events
    networks:
      - hale-bopp

  watcher:
    build: .
    container_name: hale-bopp-etl-watcher
    command: ["python", "-m", "hale_bopp_etl", "watch"]
    environment:
      - HALEBOPP_CONFIG=/app/config/orchestration/pipelines.yaml
      - HALEBOPP_EVENTS_DIR=/tmp/hale-bopp-events
      - PYTHONUNBUFFERED=1
    volumes:
      - events_data:/tmp/hale-bopp-events
    networks:
      - hale-bopp

volumes:
  events_data:

networks:
  hale-bopp:
    driver: bridge
